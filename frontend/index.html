<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 2rem; border-radius: 12px; width: 90%; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #185FA5; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 1rem; }
        button { width: 100%; padding: 12px; background: #185FA5; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #0C447C; }
       .option { width: 100%; padding: 12px; margin-bottom: 10px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; cursor: pointer; text-align: left; color: #333; }
        .option:hover { background: #e9ecef; }
        .option.correct { background: #d4edda; border-color: #28a745; }
        .option.wrong { background: #f8d7da; border-color: #dc3545; }
        .hidden { display: none; }
        #timer { text-align: right; font-size: 14px; color: #666; margin-bottom: 1rem; }
        #question-count { font-size: 13px; color: #888; margin-bottom: 0.5rem; }
        #score-screen { text-align: center; }
        #score-screen h2 { color: #185FA5; font-size: 2rem; margin: 1rem 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { background: #185FA5; color: white; padding: 8px; }
        td { padding: 8px; border-bottom: 1px solid #ddd; text-align: center; }
        tr:nth-child(even) { background: #f8f9fa; }
    </style>
</head>
<body>
<div class="container">

    <!-- Welcome Screen -->
    <div id="welcome-screen">
        <h1>Quiz App</h1>
        <input type="text" id="username" placeholder="Enter your name" />
        <button onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- Question Screen -->
    <div id="question-screen" class="hidden">
        <div id="question-count"></div>
        <div id="timer"></div>
        <h2 id="question-text" style="margin-bottom:1rem;font-size:18px;"></h2>
        <div id="options-container"></div>
        <button id="next-btn" class="hidden" onclick="nextQuestion()">Next Question →</button>
    </div>

    <!-- Score Screen -->
    <div id="score-screen" class="hidden">
        <h1>Quiz App</h1>
        <p>Your Score</p>
        <h2 id="final-score"></h2>
        <p id="score-message"></p>
        <h3 style="margin-top:1.5rem;">🏆 Leaderboard</h3>
        <table>
            <tr><th>Name</th><th>Score</th></tr>
            <tbody id="leaderboard-body"></tbody>
        </table>
        <button onclick="restartQuiz()" style="margin-top:1rem;">Play Again</button>
    </div>

</div>

<script>
    const questions = [
        { q: "What does HTML stand for?", opts: ["Hyper Text Markup Language", "High Tech Machine Language", "Home Tool Markup Language", "Hyper Transfer Markup Logic"], ans: 0 },
        { q: "Which language runs in a browser?", opts: ["Python", "Java", "JavaScript", "C++"], ans: 2 },
        { q: "What does CSS stand for?", opts: ["Creative Style Sheets", "Cascading Style Sheets", "Computer Style Syntax", "Colorful Style Sheets"], ans: 1 },
        { q: "What tag is used for links in HTML?", opts: ["<link>", "<a>", "<href>", "<url>"], ans: 1 },
        { q: "Which company created JavaScript?", opts: ["Google", "Microsoft", "Netscape", "Apple"], ans: 2 }
    ];

    let current = 0, score = 0, playerName = "", timerInterval;
    let leaderboard = [];

    function startQuiz() {
        playerName = document.getElementById('username').value.trim();
        if (!playerName) { alert('Please enter your name!'); return; }
        current = 0; score = 0;
        show('question-screen');
        loadQuestion();
    }

    function show(id) {
        ['welcome-screen','question-screen','score-screen'].forEach(s => {
            document.getElementById(s).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    function loadQuestion() {
        clearInterval(timerInterval);
        const q = questions[current];
        document.getElementById('question-count').textContent = `Question ${current+1} of ${questions.length}`;
        document.getElementById('question-text').textContent = q.q;
        document.getElementById('next-btn').classList.add('hidden');
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.textContent = opt;
            btn.onclick = () => selectAnswer(i);
            container.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        let time = 30;
        document.getElementById('timer').textContent = `Time: ${time}s`;
        timerInterval = setInterval(() => {
            time--;
            document.getElementById('timer').textContent = `Time: ${time}s`;
            if (time <= 0) { clearInterval(timerInterval); nextQuestion(); }
        }, 1000);
    }

    function selectAnswer(i) {
        clearInterval(timerInterval);
        const correct = questions[current].ans;
        const btns = document.querySelectorAll('.option');
        btns.forEach((btn, idx) => {
            btn.onclick = null;
            if (idx === correct) btn.classList.add('correct');
            else if (idx === i) btn.classList.add('wrong');
        });
        if (i === correct) score++;
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        current++;
        if (current < questions.length) loadQuestion();
        else showScore();
    }

    function showScore() {
        show('score-screen');
        document.getElementById('final-score').textContent = `${score}/${questions.length}`;
        document.getElementById('score-message').textContent = score >= 3 ? 'Great job! 🎉' : 'Keep practicing! 💪';
        leaderboard.push({ name: playerName, score });
        leaderboard.sort((a, b) => b.score - a.score);
        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = leaderboard.map(e => `<tr><td>${e.name}</td><td>${e.score}/${questions.length}</td></tr>`).join('');
        saveScore();
    }

    async function saveScore() {
        try {
            await fetch('http://localhost:5000/api/scores', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: playerName, score })
            });
        } catch(e) { console.log('Backend not connected yet'); }
    }

    function restartQuiz() { show('welcome-screen'); }
</script>
</body>
</html>
