    <!DOCTYPE html>
<html>
<head>
  <title>Quiz Portfolio</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .question {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    #scores {
      margin-top: 30px;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    li {
      margin: 5px 0;
    }
  </style>
</head>

<body>

  <h1>Quiz Game 🎯</h1>

  <input type="text" id="name" placeholder="Enter your name">

  <div id="quiz"></div>

  <button onclick="submitQuiz()">Submit</button>

  <h2>Leaderboard</h2>
  <ul id="scores"></ul>

  <script src="script.js"></script>

</body>
</html>
