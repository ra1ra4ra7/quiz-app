<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #222;
    }

    input {
      padding: 10px;
      width: 250px;
      margin-bottom: 20px;
    }

    .question {
      background: white;
      padding: 15px;
      margin: 10px auto;
      border-radius: 10px;
      width: 60%;
      text-align: left;
    }

    button {
      padding: 10px 20px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
    }

    #scores {
      margin-top: 20px;
      background: white;
      padding: 10px;
      width: 40%;
      margin-left: auto;
      margin-right: auto;
      border-radius: 10px;
      list-style: none;
    }
  </style>
</head>

<body>

  <h1>Quiz Game 🎯</h1>

  <input type="text" id="name" placeholder="Enter your name">

  <div id="quiz"></div>

  <button onclick="submitQuiz()">Submit</button>

  <h2>Leaderboard</h2>
  <ul id="scores"></ul>

  <script src="script.js"></script>

</body>
</html>
