<!DOCTYPE html>
<html>
<head>
  <title>Quiz Portfolio</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #222;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
    }

    #quiz {
      max-width: 600px;
      margin: auto;
    }

    .question {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: left;
    }

    label {
      display: block;
      margin: 5px 0;
      cursor: pointer;
    }

    button {
      padding: 12px 25px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    button:hover {
      background-color: #45a049;
    }

    h2 {
      margin-top: 30px;
    }

    #scores {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      list-style: none;
    }

    li {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }

    li:last-child {
      border-bottom: none;
    }
  </style>
</head>

<body>

  <h1>Quiz Game 🎯</h1>

  <input type="text" id="name" placeholder="Enter your name">

  <div id="quiz"></div>

  <button onclick="submitQuiz()">Submit</button>

  <h2>Leaderboard</h2>
  <ul id="scores"></ul>

  <script src="script.js"></script>

</body>
</html>
