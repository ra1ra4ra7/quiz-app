name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3. Install backend dependencies
      - name: Install dependencies
        run: |
          cd backend
          npm install

      # 4. Basic test
      - name: Test
        run: |
          cd backend
          node -e "console.log('Backend working')"

      # 5. Deploy to Render using hook
      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      # 6. Done
      - name: Finish
        run: echo "Deployment successful 🚀"